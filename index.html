<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Japanese Language Test — Lesson 1 to 5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --bg: #F7F6F2;
    --card: #FFFFFF;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: rgba(0,0,0,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .screen { display: none; }
  .screen.active { display: flex; }

  /* ── START SCREEN ── */
  #start-screen {
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .start-card {
    background: var(--card);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 4px 40px rgba(0,0,0,0.08);
    text-align: center;
  }
  .flag { font-size: 48px; margin-bottom: 1rem; }
  .start-card h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
  }
  .start-card .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }
  .info-row {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
    padding: 1rem;
    background: var(--bg);
    border-radius: var(--radius-sm);
  }
  .info-item { text-align: center; }
  .info-item .val { font-size: 22px; font-weight: 600; color: var(--green); }
  .info-item .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .name-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    margin-bottom: 12px;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--green); background: #fff; }
  .btn-start {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-start:hover { background: var(--green-dark); }
  .btn-start:active { transform: scale(0.98); }

  /* ── TEST SCREEN ── */
  #test-screen {
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
  }
  .test-wrapper {
    width: 100%;
    max-width: 640px;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 8px;
  }
  .q-info { font-size: 13px; color: var(--text-muted); }
  .q-info strong { color: var(--text); font-weight: 600; }
  .timer {
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--card);
    border: 1.5px solid var(--border);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    transition: all 0.3s;
  }
  .timer.warning { border-color: var(--red); color: var(--red); background: var(--red-light); }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 1.2rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 4px;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .question-card {
    background: var(--card);
    border-radius: 20px;
    padding: 1.8rem;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    margin-bottom: 1rem;
  }
  .section-tag {
    display: inline-block;
    padding: 3px 10px;
    background: var(--green-light);
    color: var(--green-dark);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .passage-box {
    background: var(--bg);
    border-left: 3px solid var(--green);
    padding: 14px 16px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin-bottom: 16px;
    font-size: 16px;
    font-family: 'Noto Sans JP', sans-serif;
    line-height: 2;
    color: var(--text);
  }
  .q-text {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 16px;
    font-family: 'Noto Sans JP', sans-serif;
    white-space: pre-line;
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.5;
  }
  .opt-btn:hover { border-color: var(--green); background: var(--green-light); }
  .opt-btn.selected { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
  .opt-btn.correct { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
  .opt-btn.wrong { border-color: var(--red); background: var(--red-light); color: #7a1f1f; }
  .opt-btn.disabled { cursor: default; pointer-events: none; }
  .opt-letter {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .btn-nav {
    padding: 10px 24px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-nav:hover { border-color: var(--green); color: var(--green); }
  .btn-nav.primary {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }
  .btn-nav.primary:hover { background: var(--green-dark); border-color: var(--green-dark); color: #fff; }
  .btn-nav.danger {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
  }
  .dots-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 1rem;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: background 0.2s;
  }
  .dot.answered { background: var(--green); }
  .dot.current { background: var(--green-dark); transform: scale(1.3); }

  /* ── RESULT SCREEN ── */
  #result-screen {
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .result-card {
    background: var(--card);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 4px 40px rgba(0,0,0,0.08);
  }
  .result-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .result-card .r-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }
  .score-big {
    text-align: center;
    padding: 1.5rem;
    background: var(--bg);
    border-radius: var(--radius);
    margin-bottom: 1.2rem;
  }
  .score-big .score-num { font-size: 52px; font-weight: 700; color: var(--green); line-height: 1; }
  .score-big .score-total { font-size: 18px; color: var(--text-muted); margin-top: 4px; }
  .score-big .score-pct { font-size: 14px; color: var(--text-muted); margin-top: 6px; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.2rem; }
  .stat-box {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
  }
  .stat-box .sv { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-box .sl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .section-breakdown { margin-bottom: 1.5rem; }
  .section-breakdown h3 { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .sec-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .sec-name { font-size: 13px; width: 90px; flex-shrink: 0; color: var(--text-muted); }
  .sec-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .sec-bar { height: 6px; background: var(--green); border-radius: 3px; transition: width 0.6s ease; }
  .sec-score { font-size: 13px; font-weight: 600; width: 40px; text-align: right; color: var(--text); }
  .grade-badge {
    text-align: center;
    padding: 8px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 1.2rem;
  }
  .grade-pass { background: var(--green-light); color: var(--green-dark); }
  .grade-fail { background: var(--red-light); color: #7a1f1f; }
  .btn-restart {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-restart:hover { background: var(--green-dark); }

  @media (max-width: 480px) {
    .start-card, .result-card { padding: 1.8rem 1.2rem; }
    .question-card { padding: 1.2rem; }
    .score-big .score-num { font-size: 40px; }
  }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen" class="screen active">
  <div class="start-card">
    <div class="flag">🎌</div>
    <h1>Japanese Language Test</h1>
    <p class="subtitle">Minna no Nihongo — Lesson 1 to 5</p>
    <div class="info-row">
      <div class="info-item"><div class="val">50</div><div class="lbl">Questions</div></div>
      <div class="info-item"><div class="val">100</div><div class="lbl">Marks</div></div>
      <div class="info-item"><div class="val">45</div><div class="lbl">Minutes</div></div>
    </div>
    <input class="name-input" id="student-name" type="text" placeholder="Enter your name..." maxlength="40" />
    <button class="btn-start" onclick="startTest()">Start Test</button>
  </div>
</div>

<!-- TEST SCREEN -->
<div id="test-screen" class="screen">
  <div class="test-wrapper">
    <div class="top-bar">
      <div class="q-info">Question <strong id="q-num">1</strong> of <strong>50</strong></div>
      <div class="timer" id="timer">45:00</div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="dots-row" id="dots-row"></div>
    <div class="question-card">
      <div class="section-tag" id="sec-tag">Section A1</div>
      <div id="passage-area"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
    </div>
    <div class="nav-row">
      <button class="btn-nav" onclick="prevQ()">← Back</button>
      <button class="btn-nav danger" onclick="confirmSubmit()">Submit Test</button>
      <button class="btn-nav primary" id="next-btn" onclick="nextQ()">Next →</button>
    </div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen" class="screen">
  <div class="result-card">
    <h2 id="r-name"></h2>
    <p class="r-sub">Minna no Nihongo — Lesson 1 to 5 Test</p>
    <div class="score-big">
      <div class="score-num" id="r-score"></div>
      <div class="score-total">out of 100 marks</div>
      <div class="score-pct" id="r-pct"></div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="sv" id="r-correct"></div><div class="sl">Correct</div></div>
      <div class="stat-box"><div class="sv" id="r-wrong"></div><div class="sl">Wrong</div></div>
      <div class="stat-box"><div class="sv" id="r-skip"></div><div class="sl">Skipped</div></div>
    </div>
    <div class="grade-badge" id="r-grade"></div>
    <div class="section-breakdown">
      <h3>Section Breakdown</h3>
      <div id="r-sections"></div>
    </div>
    <button class="btn-restart" onclick="restartTest()">Take Test Again</button>
  </div>
</div>

<script>
const QUESTIONS = [
  // SECTION A1 — Read the word and choose the correct meaning (Q1-Q7)
  {s:"A1", p:null, q:'What is the meaning of the following word?\n「がくせい」', o:['teacher','engineer','student','doctor'], a:2},
  {s:"A1", p:null, q:'What is the meaning of the following word?\n「せんせい」', o:['company employee','teacher','researcher','bank employee'], a:1},
  {s:"A1", p:null, q:'What is the meaning of the following word?\n「かいしゃいん」', o:['bank employee','doctor','student','company employee'], a:3},
  {s:"A1", p:null, q:'What is the meaning of the following word?\n「びょういん」', o:['university','hospital','library','bank'], a:1},
  {s:"A1", p:null, q:'What is the meaning of the following word?\n「えんぴつ」', o:['notebook','pencil','key','dictionary'], a:1},
  {s:"A1", p:null, q:'What is the meaning of the following word?\n「とけい」', o:['umbrella','bag','watch','camera'], a:2},
  {s:"A1", p:null, q:'What is the meaning of the following word?\n「かさ」', o:['key','bag','card','umbrella'], a:3},

  // SECTION A2 — Choose the correct Japanese word (Q8-Q14)
  {s:"A2", p:null, q:"Which word means 'dictionary' in Japanese?", o:['ざっし','しんぶん','じしょ','ノート'], a:2},
  {s:"A2", p:null, q:"Which word means 'umbrella' in Japanese?", o:['かばん','かさ','かぎ','とけい'], a:1},
  {s:"A2", p:null, q:"Which word means 'telephone' in Japanese?", o:['でんき','でんしゃ','ちかてつ','でんわ'], a:3},
  {s:"A2", p:null, q:"Which word means 'bank' in Japanese?", o:['としょかん','ゆうびんきょく','ぎんこう','びじゅつかん'], a:2},
  {s:"A2", p:null, q:"Which word means 'birthday' in Japanese?", o:['やすみ','まいにち','たんじょうび','ひるやすみ'], a:2},
  {s:"A2", p:null, q:"Which word means 'supermarket' in Japanese?", o:['えき','スーパー','がっこう','デパート'], a:1},
  {s:"A2", p:null, q:"Which word means 'bicycle' in Japanese?", o:['でんしゃ','バス','じてんしゃ','タクシー'], a:2},

  // SECTION A3 — Choose the opposite or related word (Q15-Q20)
  {s:"A3", p:null, q:'What is the opposite of 「あさ」?', o:['ひる','ばん','きょう','まいにち'], a:1},
  {s:"A3", p:null, q:'What is the opposite of 「きのう」?', o:['きょう','おととい','あさって','あした'], a:3},
  {s:"A3", p:null, q:'What is the opposite of 「いきます」?', o:['きます','かえります','おきます','はたらきます'], a:0},
  {s:"A3", p:null, q:'What is the opposite of 「おきます」?', o:['やすみます','べんきょうします','はたらきます','ねます'], a:3},
  {s:"A3", p:null, q:'What is the opposite of 「せんしゅう」?', o:['こんしゅう','まいしゅう','らいしゅう','せんげつ'], a:2},
  {s:"A3", p:null, q:'Which word has a similar meaning to 「ここ」?', o:['そちら','あちら','こちら','どちら'], a:2},

  // SECTION B1 — Choose the correct particle (Q21-Q27)
  {s:"B1", p:null, q:'Choose the correct particle for the blank.\nわたし（　）マイク・ミラーです。', o:['が','は','を','に'], a:1},
  {s:"B1", p:null, q:'Choose the correct particle for the blank.\nこれ（　）わたしの ほんです。', o:['を','が','は','で'], a:2},
  {s:"B1", p:null, q:'Choose the correct particle for the blank.\nミラーさんは IMC（　）しゃいんです。', o:['は','が','の','を'], a:2},
  {s:"B1", p:null, q:'Choose the correct particle for the blank.\nでんわ（　）あそこです。', o:['を','で','が','は'], a:3},
  {s:"B1", p:null, q:'Choose the correct particle for the blank.\nわたしは まいあさ ６じ（　）おきます。', o:['は','が','に','を'], a:2},
  {s:"B1", p:null, q:'Choose the correct particles for the blanks.\nぎんこうは ９じ（　）３じ（　）です。', o:['から／まで','は／が','を／に','で／と'], a:0},
  {s:"B1", p:null, q:'Choose the correct particle for the blank.\nきのう べんきょう（　）しましたか。', o:['が','は','を','で'], a:2},

  // SECTION B2 — Choose the correct sentence (Q28-Q34)
  {s:"B2", p:null, q:'Which is the correct sentence?', o:['わたしは がくせい じゃ ありません','わたしが がくせい じゃ ありません は','がくせい わたしは じゃ ありません','わたしは ありません じゃ がくせい'], a:0},
  {s:"B2", p:null, q:'Which is the correct sentence?', o:['なんですか これは が','これは なんですか','は これが なんですか','なんですか は これ が'], a:1},
  {s:"B2", p:null, q:'Which is the correct sentence?', o:['あそこは トイレ どこですか','どこですか トイレ あそこは','トイレは どこですか','は トイレ どこですか あそこ'], a:2},
  {s:"B2", p:null, q:'Which is the correct sentence?', o:['に６じ おきます まいあさ わたしは','わたしは まいあさ おきます ６じに','まいあさ わたしは に おきます ６じ','わたしは まいあさ ６じに おきます'], a:3},
  {s:"B2", p:null, q:'Which is the correct sentence?', o:['でんしゃで わたしは いきます がっこうへ','わたしは がっこうへ でんしゃで いきます','がっこうへ いきます は わたし でんしゃで','わたしは でんしゃ がっこうへ いきますで'], a:1},
  {s:"B2", p:null, q:'Which is the correct sentence?', o:['ぎんこうは ９じから ３じまでです','ぎんこうは ３じから ９じまでです','ぎんこうは ９じまで ３じからです','ぎんこうは ９じ ３じからまでです'], a:0},
  {s:"B2", p:null, q:'Which is the correct sentence?', o:['かぞくと にほんへ わたしは きました','にほんへ わたしは かぞくと きました','わたしは きました にほんへ かぞくと','わたしは かぞくと にほんへ きました'], a:3},

  // SECTION B3 — Choose the correct response for the situation (Q35-Q40)
  {s:"B3", p:null, q:'What do you say when you meet someone for the first time?', o:['どうも ありがとう ございます','はじめまして。どうぞ よろしく','すみません、どこですか','おねがいします'], a:1},
  {s:"B3", p:null, q:'Your friend asks 「これは あなたの かばんですか」. It is NOT your bag. What do you say?', o:['はい、そうです','どうぞ','いいえ、ちがいます','そうですか'], a:2},
  {s:"B3", p:null, q:'You are at a department store and want the staff to show you a wine. What do you say?', o:['ワインを ください','ワインは どこですか','ワインを みせて ください','ワインは いくらですか'], a:2},
  {s:"B3", p:null, q:'Your friend asks 「まいにち なんじに おきますか」. You wake up at 6 o\'clock. What do you say?', o:['６じから おきます','６じまで おきます','６じで おきます','６じに おきます'], a:3},
  {s:"B3", p:null, q:'At the station you want to ask if this train goes to Koshien. It does NOT go there. What is the correct answer?', o:['はい、いきます','いいえ、いきません','そうですか','どうぞ よろしく'], a:1},
  {s:"B3", p:null, q:'You are giving something to someone as a gift. What do you say?', o:['ありがとう ございます','すみません','ほんの きもちです。どうぞ','はじめまして'], a:2},

  // SECTION C1 — Reading Passage 1 (Q41-Q45)
  {s:"C1", p:"わたしは マリアです。ブラジルじんです。いま さくらだいがくの がくせいです。まいあさ ７じに おきます。だいがくへ でんしゃで いきます。だいがくは ９じから ４じまでです。", q:'Where is Maria from?', o:['America','India','France','Brazil'], a:3},

const SECTION_NAMES = {
  A1: 'Section A1 — Vocabulary: Meaning',
  A2: 'Section A2 — Vocabulary: English to Japanese',
  A3: 'Section A3 — Vocabulary: Opposite / Related',
  B1: 'Section B1 — Grammar: Particles',
  B2: 'Section B2 — Grammar: Correct Sentence',
  B3: 'Section B3 — Grammar: Situation Response',
  C1: 'Section C1 — Reading Passage 1',
  C2: 'Section C2 — Reading Passage 2',
};

let current = 0;
let answers = new Array(50).fill(-1);
let timerInterval = null;
let secondsLeft = 45 * 60;
let studentName = '';
let submitted = false;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startTest() {
  const n = document.getElementById('student-name').value.trim();
  if (!n) { document.getElementById('student-name').focus(); return; }
  studentName = n;
  current = 0;
  answers = new Array(50).fill(-1);
  secondsLeft = 45 * 60;
  submitted = false;
  buildDots();
  renderQ();
  show('test-screen');
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      submitTest();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  const el = document.getElementById('timer');
  el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  el.className = 'timer' + (secondsLeft <= 300 ? ' warning' : '');
}

function buildDots() {
  const row = document.getElementById('dots-row');
  row.innerHTML = '';
  for (let i = 0; i < 50; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.title = 'Q' + (i+1);
    d.onclick = () => { current = i; renderQ(); };
    row.appendChild(d);
  }
}

function updateDots() {
  const dots = document.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.className = 'dot' + (answers[i] !== -1 ? ' answered' : '') + (i === current ? ' current' : '');
  });
}

function renderQ() {
  const q = QUESTIONS[current];
  document.getElementById('q-num').textContent = current + 1;
  document.getElementById('sec-tag').textContent = SECTION_NAMES[q.s];
  document.getElementById('prog').style.width = ((current + 1) / 50 * 100) + '%';

  const passArea = document.getElementById('passage-area');
  passArea.innerHTML = q.p ? '<div class="passage-box">' + q.p + '</div>' : '';

  document.getElementById('q-text').textContent = 'Q' + (current + 1) + '. ' + q.q;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = '<span class="opt-letter">' + letters[i] + '</span>' + opt;
    btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });

  document.getElementById('next-btn').textContent = current === 49 ? 'Finish →' : 'Next →';
  updateDots();
}

function selectAnswer(i) {
  if (submitted) return;
  answers[current] = i;
  renderQ();
}

function prevQ() {
  if (current > 0) { current--; renderQ(); }
}

function nextQ() {
  if (current < 49) { current++; renderQ(); }
  else confirmSubmit();
}

function confirmSubmit() {
  const unanswered = answers.filter(a => a === -1).length;
  let msg = 'Are you sure you want to submit the test?';
  if (unanswered > 0) msg = unanswered + ' question(s) are unanswered. ' + msg;
  if (confirm(msg)) submitTest();
}

function submitTest() {
  clearInterval(timerInterval);
  submitted = true;
  showResult();
}

function showResult() {
  let correct = 0;
  const secData = {};
  Object.keys(SECTION_NAMES).forEach(k => { secData[k] = {correct:0, total:0}; });

  QUESTIONS.forEach((q, i) => {
    secData[q.s].total++;
    if (answers[i] === q.a) { correct++; secData[q.s].correct++; }
  });

  const score = correct * 2;
  const pct = Math.round(score);

  document.getElementById('r-name').textContent = studentName;
  document.getElementById('r-score').textContent = score;
  document.getElementById('r-pct').textContent = correct + ' out of 50 questions correct';
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = answers.filter((a,i) => a !== -1 && a !== QUESTIONS[i].a).length;
  document.getElementById('r-skip').textContent = answers.filter(a => a === -1).length;

  const grade = document.getElementById('r-grade');
  if (pct >= 60) {
    grade.textContent = '✓ PASSED — Well done, ' + studentName + '!';
    grade.className = 'grade-badge grade-pass';
  } else {
    grade.textContent = '✗ FAILED — Keep studying, ' + studentName + '!';
    grade.className = 'grade-badge grade-fail';
  }

  const secDiv = document.getElementById('r-sections');
  secDiv.innerHTML = '';
  Object.entries(secData).forEach(([key, val]) => {
    const pctSec = val.total > 0 ? Math.round(val.correct / val.total * 100) : 0;
    secDiv.innerHTML += `
      <div class="sec-row">
        <div class="sec-name">${key}</div>
        <div class="sec-bar-wrap"><div class="sec-bar" style="width:${pctSec}%"></div></div>
        <div class="sec-score">${val.correct}/${val.total}</div>
      </div>`;
  });

  show('result-screen');
}

function restartTest() {
  show('start-screen');
  document.getElementById('student-name').value = '';
}
</script>
